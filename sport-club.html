<!DOCTYPE html>
<html lang="fr" data-theme="dark" data-ambiance="classic">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chapman Sports — Mon Club</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="sport.css">
  <script>
    const savedMode = localStorage.getItem('cinejournal_mode') || 'dark';
    const savedAmb = localStorage.getItem('cinejournal_ambiance') || 'classic';
    document.documentElement.setAttribute('data-theme', savedMode);
    document.documentElement.setAttribute('data-ambiance', savedAmb);
  </script>
</head>
<body class="sport-theme">

  <nav class="sport-nav">
    <a href="sport.html" class="back-hub">← Dashboard Sports</a>
    <div class="sport-logo" id="header-club-name">Chargement...</div>
    <div style="display:flex;align-items:center;gap:0.8rem;font-size:0.8rem;color:rgba(255,255,255,0.4);">
      <span id="last-refresh"></span>
      <button id="refresh-btn" onclick="loadClub()"
        style="background:rgba(255,255,255,0.08);border:none;color:#fff;padding:0.4rem 0.8rem;border-radius:20px;cursor:pointer;font-size:0.8rem;">
        🔄 Actualiser
      </button>
    </div>
  </nav>

  <main class="sport-container" style="padding-top:1rem;">

    <!-- Hero Club -->
    <div class="club-hero" id="club-hero"
      style="background-image:url('https://images.unsplash.com/photo-1518605368461-1ee7c51272fc?auto=format&fit=crop&q=80&w=2000');">
      <div class="club-hero-content">
        <img src="" alt="" class="club-hero-badge" id="club-hero-badge" style="display:none;">
        <div class="club-hero-info">
          <h1 id="club-title">Chargement...</h1>
          <p id="club-subtitle" style="color:rgba(255,255,255,0.7);"></p>
        </div>
      </div>
    </div>

    <!-- Grille principale -->
    <div class="sport-grid">

      <!-- Colonne gauche -->
      <div>

        <!-- Derniers résultats -->
        <h2 class="sport-panel-title">📅 Derniers Résultats</h2>
        <div class="sport-panel" style="margin-bottom:2rem;padding:1rem;" id="matches-container">
          <p style="color:var(--text-muted);text-align:center;padding:1rem;">Récupération...</p>
        </div>

        <!-- Prochain match -->
        <div id="next-match-block" style="display:none;margin-bottom:2rem;">
          <h2 class="sport-panel-title">📆 Prochain Match</h2>
          <div class="sport-panel" style="padding:1.2rem;" id="next-match-container"></div>
        </div>

        <!-- Classement -->
        <h2 class="sport-panel-title">📊 Classement</h2>
        <div class="sport-panel" style="margin-bottom:2rem;overflow-x:auto;">
          <table class="standings-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Équipe</th>
                <th>J</th>
                <th>V</th>
                <th>N</th>
                <th>D</th>
                <th style="color:var(--gold)">Pts</th>
              </tr>
            </thead>
            <tbody id="standings-container">
              <tr><td colspan="7" style="text-align:center;color:var(--text-muted);padding:2rem;">Chargement du classement...</td></tr>
            </tbody>
          </table>
        </div>

        <!-- Effectif -->
        <h2 class="sport-panel-title">👥 Effectif</h2>
        <div class="sport-panel">
          <div class="roster-grid" id="roster-container">
            <p style="color:var(--text-muted);text-align:center;grid-column:1/-1;padding:2rem;">Chargement de l'effectif...</p>
          </div>
        </div>

      </div>

      <!-- Colonne droite : News -->
      <div>
        <div class="sport-panel" style="position:sticky;top:80px;">
          <h2 class="sport-panel-title">🗞️ Actualités</h2>
          <div id="club-news-container" class="news-list">
            <p style="color:var(--text-muted);">Récupération des actualités...</p>
          </div>
        </div>
      </div>

    </div>
  </main>

  <!-- Modal notation match -->
  <div id="rating-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;align-items:center;justify-content:center;">
    <div style="background:var(--bg-card,#1a1a2e);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:2rem;max-width:380px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.6);">
      <h3 id="rating-modal-title" style="color:#fff;font-size:1rem;margin:0 0 0.5rem;font-family:Inter,sans-serif;"></h3>
      <p style="color:rgba(255,255,255,0.5);font-size:0.85rem;margin:0 0 1.5rem;">Ta note pour ce match (0 → 10)</p>
      <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;">
        <input type="range" id="rating-slider" min="0" max="10" step="0.5" value="7"
          style="flex:1;accent-color:var(--gold,#c8a84b);"
          oninput="document.getElementById('rating-display').textContent=parseFloat(this.value).toFixed(1)">
        <span id="rating-display" style="color:var(--gold,#c8a84b);font-weight:700;font-size:1.3rem;min-width:2.5rem;text-align:center;">7.0</span>
      </div>
      <div style="display:flex;gap:1rem;">
        <button onclick="document.getElementById('rating-modal').style.display='none'"
          style="flex:1;padding:0.75rem;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#fff;cursor:pointer;">Annuler</button>
        <button id="rating-confirm-btn"
          style="flex:1;padding:0.75rem;background:linear-gradient(135deg,#c8a84b,#f0c060);border:none;border-radius:8px;color:#000;font-weight:700;cursor:pointer;">⭐ Enregistrer</button>
      </div>
    </div>
  </div>

  <script src="sport.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const clubKey = params.get('club') || 'psg';
    const cfg = CLUBS_CONFIG[clubKey];

    if (!cfg) {
      document.getElementById('club-title').textContent = 'Club non trouvé';
    }

    // ── Helpers traduction positions rugby/foot ──
    function translatePosition(pos) {
      if (!pos) return 'Joueur';
      const map = {
        'Goalkeeper': 'Gardien', 'Keeper': 'Gardien',
        'Defender': 'Défenseur', 'Centre Back': 'Défenseur Central',
        'Left Back': 'Arrière Gauche', 'Right Back': 'Arrière Droit',
        'Midfielder': 'Milieu', 'Defensive Midfield': 'Milieu Défensif',
        'Central Midfield': 'Milieu Central', 'Attacking Midfield': 'Milieu Offensif',
        'Forward': 'Attaquant', 'Left Winger': 'Ailier Gauche',
        'Right Winger': 'Ailier Droit', 'Centre Forward': 'Buteur',
        'Manager': 'Manager / Coach',
        'Prop': 'Pilier', 'Hooker': 'Talonneur', 'Lock': 'Deuxième ligne',
        'Flanker': 'Flanker', 'Number 8': 'Numéro 8',
        'Scrum-Half': 'Demi de mêlée', 'Fly-Half': 'Demi d\'ouverture',
        'Centre': 'Centre', 'Wing': 'Ailier', 'Full Back': 'Arrière'
      };
      return map[pos] || pos;
    }

    // ── Chargement principal ─────────────────
    async function loadClub() {
      if (!cfg) return;

      const btn = document.getElementById('refresh-btn');
      if (btn) { btn.textContent = '⏳'; btn.disabled = true; }

      document.title = `${cfg.name} — Chapman Sports`;
      document.getElementById('header-club-name').textContent = cfg.name;
      document.getElementById('club-title').textContent = cfg.name;

      if (cfg.badge) {
        const badge = document.getElementById('club-hero-badge');
        badge.src = cfg.badge;
        badge.style.display = 'block';
      }
      if (cfg.banner) {
        document.getElementById('club-hero').style.backgroundImage = `url('${cfg.banner}')`;
      }

      try {
        if (cfg.source === 'espn') {
          await loadPSGData();
        } else {
          await loadRCTData();
        }
        await loadClubNews();
        markRefreshed();
      } catch(e) {
        console.error('Club load error:', e);
      }

      if (btn) { btn.textContent = '🔄 Actualiser'; btn.disabled = false; }
    }

    // ── PSG via ESPN ─────────────────────────
    async function loadPSGData() {
      const teamId = await ESPN.getTeamId('paris-saint-germain');

      document.getElementById('club-subtitle').innerHTML =
        `⚽ Ligue 1 · Parc des Princes · Paris · <a href="https://www.psg.fr" target="_blank" style="color:var(--gold)">Site Officiel</a>`;

      // Standings
      try {
        const standings = await ESPN.getStandings();
        const tbody = document.getElementById('standings-container');
        if (standings.length) {
          tbody.innerHTML = standings.slice(0, 10).map(row => {
            const isPsg = row.name?.toLowerCase().includes('paris') || row.short === 'PSG';
            return `
              <tr style="${isPsg ? 'background:rgba(0,65,112,0.3);' : ''}">
                <td><strong style="${isPsg ? 'color:var(--gold);' : ''}">${row.rank}</strong></td>
                <td class="team-cell">
                  ${row.logo ? `<img src="${row.logo}" alt="${row.short}" onerror="this.style.display='none'">` : ''}
                  <span style="${isPsg ? 'color:var(--gold);font-weight:700;' : ''}">${row.name}</span>
                </td>
                <td>${row.played}</td>
                <td>${row.wins}</td>
                <td>${row.draws}</td>
                <td>${row.losses}</td>
                <td style="color:var(--gold);font-weight:bold;">${row.points}</td>
              </tr>`;
          }).join('');
        }
      } catch(e) { console.warn('PSG standings error:', e); }

      // Matchs
      const ratings = getMatchRatings();
      try {
        const matches = await ESPN.getLastMatches(teamId, 5);
        const container = document.getElementById('matches-container');
        if (matches.length) {
          container.innerHTML = matches.map(m => renderMatchItem(m, teamId, cfg.name, ratings)).join('');
        } else {
          container.innerHTML = `<p style="color:var(--text-muted);text-align:center;padding:1rem;">Aucun résultat récent.</p>`;
        }
      } catch(e) {
        document.getElementById('matches-container').innerHTML =
          `<p style="color:var(--text-muted);text-align:center;padding:1rem;">⚠️ Données matchs indisponibles</p>`;
      }

      // Prochain match
      try {
        const next = await ESPN.getNextMatch(teamId);
        if (next) {
          document.getElementById('next-match-block').style.display = 'block';
          document.getElementById('next-match-container').innerHTML = `
            <div style="display:flex;align-items:center;justify-content:space-between;gap:1rem;">
              <span style="color:#fff;font-weight:600;font-size:1rem;">${next.homeName}</span>
              <div style="text-align:center;">
                <div style="font-size:0.75rem;color:var(--text-muted);margin-bottom:0.2rem;">${next.date}</div>
                <div style="background:rgba(255,255,255,0.1);padding:0.3rem 0.8rem;border-radius:6px;color:#fff;font-weight:700;">VS</div>
              </div>
              <span style="color:#fff;font-weight:600;font-size:1rem;">${next.awayName}</span>
            </div>`;
        }
      } catch {}

      // Pas d'effectif via ESPN gratuit
      document.getElementById('roster-container').innerHTML =
        `<p style="color:var(--text-muted);grid-column:1/-1;text-align:center;padding:1rem;">
          Effectif disponible sur <a href="https://www.psg.fr/equipes/equipe-professionnelle/joueurs" target="_blank" style="color:var(--gold);">psg.fr</a>
        </p>`;
    }

    // ── RCT via TheSportsDB ──────────────────
    async function loadRCTData() {
      const team = await SPORTSDB.getTeam('Toulon');
      if (!team) {
        document.getElementById('club-title').textContent = 'RC Toulon — Données indisponibles';
        return;
      }

      const teamId = team.idTeam;

      // Info club
      const founded = team.intFormedYear ? ` · Fondé en ${team.intFormedYear}` : '';
      const stadium = team.strStadium ? ` · ${team.strStadium}` : '';
      const website = team.strWebsite ? ` · <a href="https://${team.strWebsite.replace(/^https?:\/\//,'')}" target="_blank" style="color:var(--gold);">Site Officiel</a>` : '';
      document.getElementById('club-subtitle').innerHTML =
        `🏉 ${team.strLeague || 'Top 14'}${stadium}${founded}${website}`;

      if (team.strTeamBadge) {
        const badge = document.getElementById('club-hero-badge');
        badge.src = team.strTeamBadge;
        badge.style.display = 'block';
      }
      if (team.strTeamFanart1) {
        document.getElementById('club-hero').style.backgroundImage = `url('${team.strTeamFanart1}')`;
      }

      // Description club
      if (team.strDescriptionFR || team.strDescriptionEN) {
        const desc = document.createElement('div');
        desc.style.cssText = 'background:rgba(0,0,0,0.4);border-radius:12px;padding:1.2rem;margin-bottom:1.5rem;color:rgba(255,255,255,0.8);font-size:0.9rem;line-height:1.7;border:1px solid rgba(255,255,255,0.05);';
        desc.innerHTML = `<p style="margin:0;">${(team.strDescriptionFR || team.strDescriptionEN).slice(0, 500)}${(team.strDescriptionFR || team.strDescriptionEN).length > 500 ? '...' : ''}</p>`;
        document.getElementById('matches-container').parentElement.prepend(desc);
      }

      // Standings
      if (team.idLeague) {
        try {
          const table = await SPORTSDB.getStandings(team.idLeague, '2024-2025');
          const tbody = document.getElementById('standings-container');
          if (table.length) {
            tbody.innerHTML = table.slice(0, 10).map(row => {
              const isRct = row.strTeam?.toLowerCase().includes('toulon');
              return `
                <tr style="${isRct ? 'background:rgba(218,0,0,0.2);' : ''}">
                  <td><strong style="${isRct ? 'color:var(--gold);' : ''}">${row.intRank}</strong></td>
                  <td class="team-cell">
                    ${row.strTeamBadge ? `<img src="${row.strTeamBadge}" alt="" onerror="this.style.display='none'">` : ''}
                    <span style="${isRct ? 'color:var(--gold);font-weight:700;' : ''}">${row.strTeam}</span>
                  </td>
                  <td>${row.intPlayed}</td>
                  <td>${row.intWin}</td>
                  <td>${row.intDraw || 0}</td>
                  <td>${row.intLoss}</td>
                  <td style="color:var(--gold);font-weight:bold;">${row.intPoints}</td>
                </tr>`;
            }).join('');
          } else {
            tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;color:var(--text-muted);padding:1rem;">Classement indisponible pour cette saison</td></tr>`;
          }
        } catch(e) {
          document.getElementById('standings-container').innerHTML =
            `<tr><td colspan="7" style="text-align:center;color:var(--text-muted);padding:1rem;">⚠️ Classement indisponible</td></tr>`;
        }
      }

      // Derniers matchs
      const ratings = getMatchRatings();
      try {
        const matches = await SPORTSDB.getLastMatches(teamId, 5);
        const container = document.getElementById('matches-container');
        if (matches.length) {
          container.innerHTML = matches.map(m => renderSportsdbMatchItem(m, teamId, ratings)).join('');
        } else {
          container.innerHTML = `<p style="color:var(--text-muted);text-align:center;padding:1rem;">Aucun résultat récent.</p>`;
        }
      } catch(e) {
        document.getElementById('matches-container').innerHTML =
          `<p style="color:var(--text-muted);text-align:center;padding:1rem;">⚠️ Données matchs indisponibles</p>`;
      }

      // Prochain match
      try {
        const nextMatches = await SPORTSDB.getNextMatches(teamId);
        if (nextMatches.length > 0) {
          const m = nextMatches[0];
          const d = m.dateEvent ? new Date(m.dateEvent).toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric' }) : '?';
          document.getElementById('next-match-block').style.display = 'block';
          document.getElementById('next-match-container').innerHTML = `
            <div style="display:flex;align-items:center;justify-content:space-between;gap:1rem;">
              <span style="color:#fff;font-weight:600;">${m.strHomeTeam}</span>
              <div style="text-align:center;">
                <div style="font-size:0.75rem;color:var(--text-muted);margin-bottom:0.2rem;">${d}</div>
                <div style="background:rgba(255,255,255,0.1);padding:0.3rem 0.8rem;border-radius:6px;color:#fff;font-weight:700;">VS</div>
              </div>
              <span style="color:#fff;font-weight:600;">${m.strAwayTeam}</span>
            </div>`;
        }
      } catch {}

      // Effectif
      try {
        const players = await SPORTSDB.getPlayers(teamId);
        const roster = document.getElementById('roster-container');
        const withPhoto = players.filter(p => p.strThumb || p.strCutout).slice(0, 24);
        if (withPhoto.length) {
          roster.innerHTML = withPhoto.map(p => `
            <div class="player-card">
              <img src="${p.strCutout || p.strThumb}" alt="${p.strPlayer}" class="player-img"
                onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'140\\' height=\\'140\\'><rect width=\\'140\\' height=\\'140\\' fill=\\'%23222\\'/><text x=\\'50%25\\' y=\\'55%25\\' dominant-baseline=\\'middle\\' text-anchor=\\'middle\\' fill=\\'%23666\\' font-size=\\'36\\'>👤</text></svg>'">
              <div class="player-info">
                <div class="player-name">${p.strPlayer}</div>
                <div class="player-role">${translatePosition(p.strPosition)}</div>
              </div>
            </div>`).join('');
        } else {
          roster.innerHTML = `<p style="color:var(--text-muted);grid-column:1/-1;text-align:center;padding:1rem;">Photos d'effectif non disponibles.</p>`;
        }
      } catch(e) {
        document.getElementById('roster-container').innerHTML =
          `<p style="color:var(--text-muted);grid-column:1/-1;text-align:center;padding:1rem;">Effectif indisponible.</p>`;
      }
    }

    // ── News club ────────────────────────────
    async function loadClubNews() {
      const container = document.getElementById('club-news-container');
      const icon = cfg.source === 'espn' ? '⚽' : '🏉';
      try {
        const articles = await fetchGoogleNews(cfg.newsQuery, 10);
        if (articles.length) {
          container.innerHTML = articles.map(a => renderNewsItem(a, icon)).join('');
        } else {
          container.innerHTML = `<p style="color:var(--text-muted);">Aucune actualité disponible.</p>`;
        }
      } catch(e) {
        container.innerHTML = `<p style="color:var(--text-muted);">⚠️ Actualités indisponibles.</p>`;
      }
    }

    // ── Notation matchs ──────────────────────
    window.rateMatch = function(matchId, eventName) {
      const modal = document.getElementById('rating-modal');
      document.getElementById('rating-modal-title').textContent = eventName;
      document.getElementById('rating-slider').value = 7;
      document.getElementById('rating-display').textContent = '7.0';
      modal.style.display = 'flex';
      document.getElementById('rating-confirm-btn').onclick = () => {
        const val = parseFloat(document.getElementById('rating-slider').value);
        saveMatchRating(matchId, { score: val });
        modal.style.display = 'none';
        const btn = document.querySelector(`button[onclick*="${matchId}"]`);
        if (btn) btn.parentElement.innerHTML = `<span style="color:var(--gold);font-size:0.8rem;">⭐${val}/10</span>`;
      };
    };

    // ── Démarrage ────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      if (cfg) {
        loadClub();
        startAutoRefresh(loadClub);
      }
    });
  </script>
</body>
</html>
